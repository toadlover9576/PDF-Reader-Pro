<body>
<div class="load-bar" id="loadBar" style="width:0"></div>

<div class="container">
    <div class="header">
        <h1>Continua | PDF Reader PRO</h1>
        <div class="header-buttons">
            <button class="btn btn-primary" onclick="openAddModal()">+ Add PDF</button>
            <button class="btn btn-dict" id="dictToggleBtn" onclick="toggleDictPanel()">Dictionary</button>
            <button class="btn btn-secondary" onclick="toggleSidebar()">Menu</button>
        </div>
    </div>

    <div class="main-content">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-tabs">
                <div class="tab active" onclick="switchTab('library')">Library</div>
                <div class="tab" onclick="switchTab('toc')">Contents</div>
            </div>
            <div class="tab-content" id="libraryTab">
                <div class="folder-bar">
                    <select id="folderSelect" class="folder-select" onchange="changeFolder()"></select>
                    <button class="folder-pill" onclick="addFolder()">+F</button>
                    <button class="folder-pill" onclick="renameFolder()">Rename</button>
                    <button class="folder-pill" onclick="deleteFolder()">Del</button>
                </div>
                <div id="folderPalette"></div>
                <div id="libraryList"></div>
            </div>
            <div class="tab-content" id="tocTab" style="display: none;">
                <div id="tocList"></div>
            </div>
        </div>

        <div class="viewer-container">
            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="toolbar-btn" onclick="prevPage()" id="prevBtn">&#8592; Previous</button>
                    <div class="page-info">
                        <input type="number" class="page-input" id="pageInput" value="1" min="1" onchange="goToPage()">
                        <span>/ <span id="totalPages">0</span></span>
                    </div>
                    <button class="toolbar-btn" onclick="nextPage()" id="nextBtn">Next &#8594;</button>
                </div>
                <div class="toolbar-right">
                    <div class="zoom-control">
                        <button class="toolbar-btn" onclick="zoomOut()">-</button>
                        <span id="zoomLevel">100%</span>
                        <button class="toolbar-btn" onclick="zoomIn()">+</button>
                    </div>
                    <button class="toolbar-btn" onclick="toggleFullscreen()" id="fullscreenBtn">Fullscreen</button>
                </div>
            </div>
            <div class="pdf-viewer" id="pdfViewer">
                <div class="empty-state">
                    <div class="empty-state-icon"></div>
                    <h3>No PDF Loaded</h3>
                    <p>Click "Add PDF" to load a document from URL</p>
                </div>
            </div>
        </div>

        <!--  DICTIONARY PANEL  -->
        <div class="dict-panel" id="dictPanel">
            <div class="dict-header">
                <span class="dict-header-title">Dictionary</span>
                <button class="dict-close-btn" onclick="toggleDictPanel()">&#215;</button>
            </div>
            <div class="dict-search-wrap">
                <input
                    type="text"
                    class="dict-input"
                    id="dictInput"
                    placeholder="Type a word..."
                    onkeydown="if(event.key==='Enter') lookupWord()"
                    autocomplete="off"
                    autocorrect="off"
                    spellcheck="false"
                >
                <button class="dict-lookup-btn" onclick="lookupWord()">Look up</button>
            </div>
            <div class="dict-body" id="dictBody">
                <div class="dict-empty">
                    <div class="dict-empty-icon">A</div>
                    <p style="font-size:13px;color:#aaa;line-height:1.6;">
                        Enter any word to get its full definition, pronunciation, part of speech, etymology, synonyms, antonyms, and example sentences.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="addModal" onclick="if(event.target === this) closeAddModal()">
    <div class="modal-content">
        <div class="modal-header">
            Add PDF Document
            <button style="float:right;background:none;border:none;font-size:24px;cursor:pointer;color:#999" onclick="closeAddModal()">&#215;</button>
        </div>
        <div class="form-group">
            <label class="form-label">Document Name</label>
            <input type="text" class="form-input" id="pdfName" placeholder="Enter document name">
        </div>
        <div class="form-group">
            <label class="form-label">PDF URL</label>
            <input type="text" class="form-input" id="pdfUrl" placeholder="https://example.com/document.pdf">
        </div>
        <div class="modal-buttons">
            <button class="btn btn-secondary" onclick="closeAddModal()">Cancel</button>
            <button class="btn btn-primary" onclick="addPdf()">Add to Library</button>
        </div>
    </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ─── FEATURE DETECT ───────────────────────────────────────────────────────────
const SUPPORTS_OFFSCREEN = (function() {
    try { return typeof OffscreenCanvas !== 'undefined' && !!new OffscreenCanvas(1,1).getContext('2d'); }
    catch(_) { return false; }
})();

// ─── SESSION-LEVEL DOC CACHE ──────────────────────────────────────────────────
const sessionDocCache = new Map(); // bookId → pdfDoc

// ─── RENDER CACHE ─────────────────────────────────────────────────────────────
// Stores live HTMLCanvasElement objects — zero copy on paint, instant display.
const renderCache = new Map(); // cacheKey → { canvas, width, height }
const RENDER_CACHE_MAX = 30;   // bigger cache = more instant page turns
const renderCacheOrder = [];   // insertion-order LRU tracking

// ─── PRELOAD ──────────────────────────────────────────────────────────────────
let preloadTimeout = null;

// ─── PERSISTENT PDF BINARY CACHE (IndexedDB) ─────────────────────────────────
const IDB_NAME = 'continua_pdf_cache';
const IDB_STORE = 'pdfs';
let idb = null;

// Open IDB once and keep the handle; all callers share it.
const idbReady = new Promise((resolve) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(IDB_STORE)) {
            const store = db.createObjectStore(IDB_STORE, { keyPath: 'bookId' });
            store.createIndex('accessed', 'accessed', { unique: false });
        }
    };
    req.onsuccess = e => { idb = e.target.result; resolve(idb); };
    req.onerror = () => resolve(null); // graceful degradation
});

async function idbGet(bookId) {
    try {
        const db = await idbReady;
        if (!db) return null;
        return new Promise((resolve) => {
            const tx = db.transaction(IDB_STORE, 'readonly');
            const req = tx.objectStore(IDB_STORE).get(String(bookId));
            req.onsuccess = () => resolve(req.result || null);
            req.onerror = () => resolve(null);
        });
    } catch(_) { return null; }
}

async function idbPut(bookId, arrayBuffer) {
    try {
        const db = await idbReady;
        if (!db) return;
        // Evict LRU entries if at cap — do it in the same tx as the put
        const all = await new Promise(resolve => {
            const tx = db.transaction(IDB_STORE, 'readonly');
            const req = tx.objectStore(IDB_STORE).index('accessed').getAllKeys();
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => resolve([]);
        });
        const tx = db.transaction(IDB_STORE, 'readwrite');
        const store = tx.objectStore(IDB_STORE);
        if (all.length >= 20) {
            // getAllKeys on index returns sorted ascending by accessed; delete oldest
            store.delete(all[0]);
        }
        store.put({ bookId: String(bookId), data: arrayBuffer, accessed: Date.now(), size: arrayBuffer.byteLength });
    } catch(_) {}
}

async function idbDelete(bookId) {
    try {
        const db = await idbReady;
        if (!db) return;
        const tx = db.transaction(IDB_STORE, 'readwrite');
        tx.objectStore(IDB_STORE).delete(String(bookId));
    } catch (_) {}
}

function idbTouch(bookId) {
    // Fire-and-forget; don't await this ever
    idbReady.then(db => {
        if (!db) return;
        const tx = db.transaction(IDB_STORE, 'readwrite');
        const store = tx.objectStore(IDB_STORE);
        const req = store.get(String(bookId));
        req.onsuccess = () => { if (req.result) { req.result.accessed = Date.now(); store.put(req.result); } };
    }).catch(() => {});
}

async function idbGetCachedIds() {
    try {
        const db = await idbReady;
        if (!db) return new Set();
        return new Promise(resolve => {
            const tx = db.transaction(IDB_STORE, 'readonly');
            const req = tx.objectStore(IDB_STORE).getAllKeys();
            req.onsuccess = () => resolve(new Set(req.result.map(String)));
            req.onerror = () => resolve(new Set());
        });
    } catch (_) { return new Set(); }
}

let cachedBookIds = new Set();
// Kick off IDB init immediately; update badge when ready (non-blocking)
idbGetCachedIds().then(ids => { cachedBookIds = ids; renderLibrary(); });

// ─── STATE ────────────────────────────────────────────────────────────────────
let library = JSON.parse(localStorage.getItem('pdfLibrary') || '[]');
let currentPage = 1;
let totalPages = 0;
let scale = 1.5;
let pdfDoc = null;
let currentPdfId = null;
let renderInProgress = false;
let pendingRender = null;

let folders = JSON.parse(localStorage.getItem('pdfFolders') || '[]');
let activeFolder = localStorage.getItem('pdfActiveFolder') || 'All';

if (Array.isArray(folders) && typeof folders[0] === 'string') {
    folders = folders.map(name => ({ id: 'fld_' + name, name, color: '#e9ecef', icon: '' }));
}
if (!folders.length) {
    folders = [{ id: 'fld_All', name: 'All', color: '#e9ecef', icon: '' }];
    activeFolder = 'All';
}
if (!activeFolder) activeFolder = 'All';

library.forEach(b => {
    if (!Array.isArray(b.folders)) {
        b.folders = b.folder ? [b.folder] : ['All'];
        delete b.folder;
    }
    if (!b.folders.includes('All')) b.folders.push('All');
});

localStorage.setItem('pdfLibrary', JSON.stringify(library));
localStorage.setItem('pdfFolders', JSON.stringify(folders));
localStorage.setItem('pdfActiveFolder', activeFolder);

let dragStartIndex = null, dragCurrentIndex = null, isDraggingLibraryItem = false;

// ─── LOAD BAR ─────────────────────────────────────────────────────────────────
function setLoadBar(pct) {
    const bar = document.getElementById('loadBar');
    bar.style.width = pct + '%';
    if (pct >= 100) setTimeout(() => { bar.style.width = '0'; }, 400);
}

// ─── FETCH WITH TIMEOUT ───────────────────────────────────────────────────────
function fetchWithTimeout(url, timeoutMs = 12000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
}

// ─── PROXY RACE ───────────────────────────────────────────────────────────────
function getProxies(url) {
    return [
        url,
        `https://corsproxy.io/?${encodeURIComponent(url)}`,
        `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
    ];
}

async function fetchPdfBytes(url) {
    const proxies = getProxies(url);
    const racePromises = proxies.map(async proxyUrl => {
        const res = await fetchWithTimeout(proxyUrl, 12000);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const buf = await res.arrayBuffer();
        if (buf.byteLength < 100) throw new Error('Empty response');
        return buf;
    });
    return Promise.any(racePromises);
}

// ─── CORE PDF LOADER ──────────────────────────────────────────────────────────
// Three-tier loading:
//   1. Session cache  → instant (same-tab revisit)
//   2. IndexedDB      → fast (~50-200ms, no network)
//   3. Network        → fetch bytes, parse, store in IDB for next time
//
// Key insight: IDB read is kicked off in parallel with showing the skeleton,
// not awaited before we even start. The caller gets the doc as fast as possible.

const cMapUrl = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/';
const PDF_OPTIONS = { cMapUrl, cMapPacked: true, disableAutoFetch: false, disableStream: false };

async function loadPdfFast(url, bookId) {
    // Tier 1: session memory — truly instant
    if (sessionDocCache.has(bookId)) {
        idbTouch(bookId);
        return sessionDocCache.get(bookId);
    }

    setLoadBar(15);

    // Tier 2: IndexedDB — fast local read, no network round-trip
    // We check cachedBookIds first to skip the async IDB lookup entirely when
    // we know nothing is there.
    if (cachedBookIds.has(String(bookId))) {
        const cached = await idbGet(bookId);
        if (cached && cached.data) {
            setLoadBar(60);
            idbTouch(bookId);
            try {
                const doc = await pdfjsLib.getDocument({ ...PDF_OPTIONS, data: cached.data }).promise;
                sessionDocCache.set(bookId, doc);
                setLoadBar(100);
                return doc;
            } catch (_) {
                // Corrupted cache entry — fall through to network
                await idbDelete(bookId);
                cachedBookIds.delete(String(bookId));
            }
        }
    }

    // Tier 3: Network fetch — race all proxies simultaneously
    setLoadBar(25);
    let arrayBuffer = null;
    try {
        arrayBuffer = await fetchPdfBytes(url);
    } catch (_) {
        // fetchPdfBytes failed entirely; try pdfjsLib streaming as last resort
        setLoadBar(40);
        const proxies = getProxies(url);
        const docPromises = proxies.map(proxyUrl =>
            pdfjsLib.getDocument({ ...PDF_OPTIONS, url: proxyUrl, withCredentials: false }).promise
        );
        try {
            const doc = await Promise.any(docPromises);
            sessionDocCache.set(bookId, doc);
            setLoadBar(100);
            return doc;
        } catch(finalErr) {
            setLoadBar(0);
            throw new Error('All loading strategies failed. The PDF URL may be unreachable or CORS-blocked. Try a direct PDF link.');
        }
    }

    setLoadBar(75);
    // Pass buffer directly — no .slice(0) copy needed, pdfjsLib doesn't mutate it
    const doc = await pdfjsLib.getDocument({ ...PDF_OPTIONS, data: arrayBuffer }).promise;
    sessionDocCache.set(bookId, doc);
    setLoadBar(100);

    // Store in IDB asynchronously — don't block rendering
    idbPut(bookId, arrayBuffer).then(() => {
        cachedBookIds.add(String(bookId));
        updateLibraryCacheBadge(bookId); // targeted badge update, not full re-render
    });

    return doc;
}

// ─── TARGETED CACHE BADGE UPDATE ─────────────────────────────────────────────
// Avoids full renderLibrary() call just to show the CACHED badge
function updateLibraryCacheBadge(bookId) {
    const items = document.querySelectorAll('.library-item');
    items.forEach(item => {
        const idx = parseInt(item.getAttribute('data-index'));
        if (!isNaN(idx) && library[idx] && library[idx].id === bookId) {
            const titleEl = item.querySelector('.library-item-title');
            if (titleEl && !titleEl.querySelector('.cache-badge')) {
                const badge = document.createElement('span');
                badge.className = 'cache-badge';
                badge.textContent = 'CACHED';
                titleEl.appendChild(badge);
            }
        }
    });
}

// ─── PAGE RENDER ──────────────────────────────────────────────────────────────
// Key optimizations:
//   - Cache stores the live HTMLCanvasElement — painting is a single DOM append,
//     no getImageData/putImageData copy overhead.
//   - If already cached, paint is synchronous and ~instant.
//   - Skeleton only shown when we actually have to render (cache miss).

async function renderPage(pageNum) {
    if (!pdfDoc) return;

    if (renderInProgress) {
        pendingRender = pageNum;
        return;
    }

    renderInProgress = true;
    pendingRender = null;

    const viewer = document.getElementById('pdfViewer');

    try {
        const cacheKey = `${currentPdfId}-${pageNum}-${scale}`;

        if (!renderCache.has(cacheKey)) {
            // Cache miss — need to actually render
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale });

            // Show skeleton sized to the actual page — avoids layout jump
            const skeleton = document.createElement('div');
            skeleton.className = 'loading-skeleton';
            skeleton.style.cssText = `width:${viewport.width}px;height:${viewport.height}px`;
            viewer.innerHTML = '';
            viewer.appendChild(skeleton);

            // Render to a canvas we'll keep in the cache
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');
            await page.render({ canvasContext: ctx, viewport }).promise;

            evictRenderCache();
            renderCache.set(cacheKey, canvas);
            renderCacheOrder.push(cacheKey);
        }

        // Cache hit (or just-rendered) — swap skeleton for canvas
        const canvas = renderCache.get(cacheKey);
        viewer.innerHTML = '';
        const container = document.createElement('div');
        container.className = 'pdf-canvas-container';
        container.appendChild(canvas);
        viewer.appendChild(container);

        currentPage = pageNum;
        document.getElementById('pageInput').value = pageNum;
        updateProgress();
        schedulePreload(pageNum);

    } catch (e) {
        console.error('renderPage error:', e);
        viewer.innerHTML =
            `<div class="empty-state"><div class="empty-state-icon">!</div><h3>Render Error</h3><p>${e.message}</p></div>`;
    } finally {
        renderInProgress = false;
        if (pendingRender !== null) {
            const next = pendingRender;
            pendingRender = null;
            await renderPage(next);
        }
    }
}

function evictRenderCache() {
    while (renderCache.size >= RENDER_CACHE_MAX) {
        const oldest = renderCacheOrder.shift();
        renderCache.delete(oldest);
    }
}

// ─── PARALLEL PRELOAD ────────────────────────────────────────────────────────
// Preload next 3 and previous 1 pages in parallel (not sequential).
// Uses requestIdleCallback when available so it doesn't compete with rendering.
function schedulePreload(currentPageNum) {
    if (preloadTimeout) clearTimeout(preloadTimeout);
    preloadTimeout = setTimeout(() => {
        const toPreload = [currentPageNum + 1, currentPageNum + 2, currentPageNum + 3, currentPageNum - 1]
            .filter(p => p >= 1 && p <= totalPages);

        const run = async () => {
            // All pages rendered in parallel
            await Promise.allSettled(toPreload.map(async p => {
                const key = `${currentPdfId}-${p}-${scale}`;
                if (renderCache.has(key) || !pdfDoc) return;
                const page = await pdfDoc.getPage(p);
                const viewport = page.getViewport({ scale });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                if (!renderCache.has(key)) { // check again after async gap
                    evictRenderCache();
                    renderCache.set(key, canvas);
                    renderCacheOrder.push(key);
                }
            }));
        };

        if (typeof requestIdleCallback !== 'undefined') {
            requestIdleCallback(run, { timeout: 2000 });
        } else {
            run();
        }
    }, 150); // shorter delay than before
}

// ─── LIBRARY LOADING ──────────────────────────────────────────────────────────
async function loadPdfFromLibrary(index) {
    const item = library[index];
    currentPdfId = item.id;

    const viewer = document.getElementById('pdfViewer');
    // Show a skeleton immediately — sized to A4 default until we know real dims
    viewer.innerHTML = `<div class="loading-skeleton" style="width:595px;height:842px;"></div>`;

    try {
        pdfDoc = await loadPdfFast(item.url, item.id);

        totalPages = pdfDoc.numPages;
        currentPage = item.currentPage || 1;
        scale = item.scale || 1.5;

        document.getElementById('totalPages').textContent = totalPages;
        document.getElementById('pageInput').max = totalPages;
        updateZoomDisplay();

        // Render first page immediately
        await renderPage(currentPage);

        // TOC is fire-and-forget — don't block first-page display
        loadTableOfContents().catch(() => {});

        renderLibrary();

    } catch (error) {
        viewer.innerHTML = `<div class="empty-state"><div class="empty-state-icon">!</div><h3>Failed to Load PDF</h3><p>${error.message}</p></div>`;
        setLoadBar(0);
        console.error(error);
    }
}

// ─── ADD PDF ──────────────────────────────────────────────────────────────────
async function addPdf() {
    const name = document.getElementById('pdfName').value.trim();
    const url = document.getElementById('pdfUrl').value.trim();
    if (!name || !url) { alert('Please enter both name and URL'); return; }

    const addButton = event.target;
    addButton.textContent = 'Loading...';
    addButton.disabled = true;

    try {
        const tempId = Date.now();
        const pdf = await loadPdfFast(url, tempId);

        const pdfItem = {
            id: tempId,
            name,
            url,
            currentPage: 1,
            totalPages: pdf.numPages,
            scale: 1.5,
            folders: [activeFolder || 'All'],
            addedDate: new Date().toISOString()
        };
        if (!pdfItem.folders.includes('All')) pdfItem.folders.push('All');

        library.push(pdfItem);
        localStorage.setItem('pdfLibrary', JSON.stringify(library));
        renderLibrary();
        closeAddModal();
        await loadPdfFromLibrary(library.length - 1);
    } catch (error) {
        alert('Failed to load PDF. Error: ' + error.message);
        console.error(error);
    } finally {
        addButton.textContent = 'Add to Library';
        addButton.disabled = false;
    }
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
async function nextPage() {
    if (currentPage < totalPages) await renderPage(currentPage + 1);
}

async function prevPage() {
    if (currentPage > 1) await renderPage(currentPage - 1);
}

async function goToPage() {
    const pageNum = parseInt(document.getElementById('pageInput').value);
    if (pageNum >= 1 && pageNum <= totalPages) await renderPage(pageNum);
}

// ─── ZOOM ─────────────────────────────────────────────────────────────────────
function clearRenderCacheForCurrentBook() {
    for (const key of [...renderCache.keys()]) {
        if (key.startsWith(`${currentPdfId}-`)) {
            renderCache.delete(key);
            const i = renderCacheOrder.indexOf(key);
            if (i !== -1) renderCacheOrder.splice(i, 1);
        }
    }
}

async function zoomIn() {
    scale += 0.25;
    updateZoomDisplay();
    clearRenderCacheForCurrentBook();
    if (pdfDoc) { await renderPage(currentPage); updateProgress(); }
}

async function zoomOut() {
    if (scale > 0.5) {
        scale -= 0.25;
        updateZoomDisplay();
        clearRenderCacheForCurrentBook();
        if (pdfDoc) { await renderPage(currentPage); updateProgress(); }
    }
}

function updateZoomDisplay() {
    document.getElementById('zoomLevel').textContent = Math.round((scale / 1.5) * 100) + '%';
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────
// No longer calls renderLibrary() on every page turn — targeted DOM update only.
function updateProgress() {
    if (!currentPdfId) return;
    const index = library.findIndex(i => i.id === currentPdfId);
    if (index === -1) return;

    library[index].currentPage = currentPage;
    library[index].scale = scale;
    localStorage.setItem('pdfLibrary', JSON.stringify(library));

    // Update only the affected library item's progress bar and text
    const itemEl = document.querySelector(`.library-item[data-index="${index}"]`);
    if (itemEl) {
        const progressText = itemEl.querySelector('.library-item-progress');
        const progressFill = itemEl.querySelector('.progress-fill');
        if (progressText) progressText.textContent = `Page ${currentPage} of ${totalPages}`;
        if (progressFill) progressFill.style.width = `${(currentPage / totalPages * 100) || 0}%`;
    }
}

// ─── TABLE OF CONTENTS ────────────────────────────────────────────────────────
async function loadTableOfContents() {
    const outline = await pdfDoc.getOutline();
    const tocList = document.getElementById('tocList');
    if (!outline || !outline.length) {
        tocList.innerHTML = '<div class="empty-state"><p>No table of contents available</p></div>';
        return;
    }
    function renderOutline(items, level = 0) {
        return items.map(item => `
            <div class="toc-item" style="padding-left:${level * 20 + 10}px" onclick="goToTocPage('${item.dest}')">
                ${item.title}
            </div>
            ${item.items ? renderOutline(item.items, level + 1) : ''}
        `).join('');
    }
    tocList.innerHTML = renderOutline(outline);
}

async function goToTocPage(dest) {
    if (!dest) return;
    try {
        const destArray = await pdfDoc.getDestination(dest);
        if (destArray) {
            const pageIndex = await pdfDoc.getPageIndex(destArray[0]);
            await renderPage(pageIndex + 1);
        }
    } catch (e) { console.error(e); }
}

// ─── FOLDERS ──────────────────────────────────────────────────────────────────
function saveFolders() {
    localStorage.setItem('pdfFolders', JSON.stringify(folders));
    localStorage.setItem('pdfActiveFolder', activeFolder);
}

function renderFolderSelect() {
    const select = document.getElementById('folderSelect');
    const palette = document.getElementById('folderPalette');
    if (!folders.find(f => f.name === 'All')) {
        folders.unshift({ id: 'fld_All', name: 'All', color: '#e9ecef', icon: '' });
    }
    if (select) {
        select.innerHTML = folders.map(f =>
            `<option value="${f.name}" ${f.name === activeFolder ? 'selected' : ''}>${f.name}</option>`
        ).join('');
    }
    if (palette) {
        palette.innerHTML = folders.map(f =>
            `<div class="folder-pill" data-folder="${f.name}" onclick="changeFolderByPill('${f.name}')">${f.name}</div>`
        ).join('');
    }
}

function changeFolderByPill(folderName) {
    activeFolder = folderName;
    document.getElementById('folderSelect').value = folderName;
    saveFolders();
    renderLibrary();
}

function changeFolder() {
    activeFolder = document.getElementById('folderSelect').value;
    saveFolders();
    renderLibrary();
}

function addFolder() {
    const name = prompt('New folder name:');
    if (!name || !name.trim() || folders.find(f => f.name === name.trim())) return;
    folders.push({ id: 'fld_' + Date.now(), name: name.trim(), color: '#e9ecef', icon: '' });
    activeFolder = name.trim();
    saveFolders();
    renderFolderSelect();
    renderLibrary();
}

function renameFolder() {
    if (activeFolder === 'All') { alert('You cannot rename the "All" folder.'); return; }
    const folder = folders.find(f => f.name === activeFolder);
    if (!folder) return;
    const newName = prompt('Rename folder:', folder.name);
    if (!newName || !newName.trim()) return;
    const trimmed = newName.trim();
    folder.name = trimmed;
    library.forEach(b => {
        const idx = b.folders.indexOf(activeFolder);
        if (idx !== -1) b.folders[idx] = trimmed;
    });
    activeFolder = trimmed;
    localStorage.setItem('pdfLibrary', JSON.stringify(library));
    saveFolders();
    renderFolderSelect();
    renderLibrary();
}

function deleteFolder() {
    if (activeFolder === 'All') { alert('You cannot delete the "All" folder.'); return; }
    if (!confirm(`Delete folder "${activeFolder}"? Books will remain in All.`)) return;
    folders = folders.filter(f => f.name !== activeFolder);
    library.forEach(b => {
        b.folders = b.folders.filter(fn => fn !== activeFolder);
        if (!b.folders.length) b.folders = ['All'];
    });
    activeFolder = 'All';
    localStorage.setItem('pdfLibrary', JSON.stringify(library));
    saveFolders();
    renderFolderSelect();
    renderLibrary();
}

// ─── LIBRARY RENDER & DRAG ───────────────────────────────────────────────────
function toggleBookMenu(event, index) {
    event.stopPropagation();
    closeAllBookMenus();
    const item = document.querySelector(`.library-item[data-index="${index}"]`);
    if (item) item.querySelector('.book-menu-dropdown')?.classList.toggle('open');
}

function closeAllBookMenus() {
    document.querySelectorAll('.book-menu-dropdown.open').forEach(m => m.classList.remove('open'));
}

function renderLibrary() {
    const list = document.getElementById('libraryList');
    const visibleItems = activeFolder === 'All'
        ? library
        : library.filter(item => Array.isArray(item.folders) && item.folders.includes(activeFolder));

    if (!visibleItems.length) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon"></div><p>No books in this folder</p></div>';
        renderFolderSelect();
        return;
    }

    list.innerHTML = visibleItems.map(item => {
        const realIndex = library.findIndex(b => b.id === item.id);
        const isCached = cachedBookIds.has(String(item.id));
        const canRemove = activeFolder !== 'All' && Array.isArray(item.folders) && item.folders.includes(activeFolder);
        return `
            <div class="library-item ${currentPdfId === item.id ? 'active' : ''}" data-index="${realIndex}">
                <div class="library-item-main" onclick="loadPdfFromLibrary(${realIndex})">
                    <div class="library-item-title">
                        ${item.name}
                        ${isCached ? '<span class="cache-badge">CACHED</span>' : ''}
                    </div>
                    <div class="library-item-progress">Page ${item.currentPage || 1} of ${item.totalPages || 1}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:${(item.currentPage / item.totalPages * 100 || 0)}%"></div>
                    </div>
                </div>
                <div class="library-item-right">
                    <button class="book-menu-btn" onclick="toggleBookMenu(event, ${realIndex})">...</button>
                    <button class="delete-btn" onclick="event.stopPropagation(); deletePdf(${realIndex})">Delete</button>
                    <div class="book-menu-dropdown">
                        <div class="book-menu-item" onclick="addBookToFolder(${realIndex})">Add to folder</div>
                        <div class="book-menu-item ${canRemove ? '' : 'disabled'}"
                             onclick="${canRemove ? `removeBookFromCurrentFolder(${realIndex})` : 'event.stopPropagation();'}">
                            Remove from this folder
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');

    renderFolderSelect();
    attachLibraryDragHandlers();
}

function attachLibraryDragHandlers() {
    document.querySelectorAll('.library-item').forEach(item => {
        item.onmousedown = function(e) {
            if (e.button !== 0 ||
                e.target.classList.contains('book-menu-btn') ||
                e.target.classList.contains('delete-btn') ||
                e.target.closest('.book-menu-dropdown')) return;

            isDraggingLibraryItem = true;
            dragStartIndex = parseInt(this.getAttribute('data-index'));
            dragCurrentIndex = dragStartIndex;
            this.classList.add('dragging');
            const currentItem = this;

            function onMouseMove(ev) {
                if (!isDraggingLibraryItem) return;
                const el = document.elementFromPoint(ev.clientX, ev.clientY);
                if (!el) return;
                const targetItem = el.closest('.library-item');
                document.querySelectorAll('.library-item.drag-over').forEach(i => i.classList.remove('drag-over'));
                if (targetItem && targetItem !== currentItem) {
                    targetItem.classList.add('drag-over');
                    dragCurrentIndex = parseInt(targetItem.getAttribute('data-index'));
                } else {
                    dragCurrentIndex = dragStartIndex;
                }
            }

            function onMouseUp() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
                if (!isDraggingLibraryItem) return;
                isDraggingLibraryItem = false;
                currentItem.classList.remove('dragging');
                document.querySelectorAll('.library-item.drag-over').forEach(i => i.classList.remove('drag-over'));
                if (dragCurrentIndex !== null && dragStartIndex !== null && dragCurrentIndex !== dragStartIndex) {
                    const temp = library[dragStartIndex];
                    library[dragStartIndex] = library[dragCurrentIndex];
                    library[dragCurrentIndex] = temp;
                    localStorage.setItem('pdfLibrary', JSON.stringify(library));
                    renderLibrary();
                }
                dragStartIndex = null;
                dragCurrentIndex = null;
            }

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        };
    });
}

function deletePdf(index) {
    if (confirm('Are you sure you want to delete this PDF from your library?')) {
        const id = library[index]?.id;
        if (id) {
            sessionDocCache.delete(id);
            idbDelete(id);
            cachedBookIds.delete(String(id));
            // Clear render cache for this book
            for (const key of [...renderCache.keys()]) {
                if (key.startsWith(`${id}-`)) {
                    renderCache.delete(key);
                    const i = renderCacheOrder.indexOf(key);
                    if (i !== -1) renderCacheOrder.splice(i, 1);
                }
            }
        }
        library.splice(index, 1);
        localStorage.setItem('pdfLibrary', JSON.stringify(library));
        renderLibrary();
        if (!library.length) {
            document.getElementById('pdfViewer').innerHTML = `
                <div class="empty-state"><div class="empty-state-icon"></div><h3>No PDF Loaded</h3><p>Click "Add PDF" to load a document from URL</p></div>
            `;
        }
    }
}

function addBookToFolder(index) {
    const book = library[index];
    if (!book) return;
    const input = prompt(`Add "${book.name}" to which folder?\n\nExisting folders:\n- ` + folders.map(f => f.name).join('\n- '));
    if (!input || !input.trim()) { closeAllBookMenus(); return; }
    const trimmed = input.trim();
    let folder = folders.find(f => f.name === trimmed);
    if (!folder) {
        folder = { id: 'fld_' + Date.now(), name: trimmed, color: '#e9ecef', icon: '' };
        folders.push(folder);
        saveFolders();
        renderFolderSelect();
    }
    if (!Array.isArray(book.folders)) book.folders = ['All'];
    if (!book.folders.includes(trimmed)) book.folders.push(trimmed);
    if (!book.folders.includes('All')) book.folders.push('All');
    localStorage.setItem('pdfLibrary', JSON.stringify(library));
    renderLibrary();
    closeAllBookMenus();
    alert(`"${book.name}" added to folder "${trimmed}".`);
}

function removeBookFromCurrentFolder(index) {
    if (activeFolder === 'All') { closeAllBookMenus(); return; }
    const book = library[index];
    if (!book || !book.folders?.includes(activeFolder)) { closeAllBookMenus(); return; }
    book.folders = book.folders.filter(fn => fn !== activeFolder);
    if (!book.folders.length) book.folders = ['All'];
    localStorage.setItem('pdfLibrary', JSON.stringify(library));
    renderLibrary();
    closeAllBookMenus();
    alert(`"${book.name}" removed from folder "${activeFolder}".`);
}

// ══════════════════════════════════════════════════════════════════════════════
// DICTIONARY PANEL
// Uses Free Dictionary API (dictionaryapi.dev) — no API key required.
// Covers the full English vocabulary: common, literary, academic, technical.
// Fully isolated — touches only its own DOM nodes and localStorage key.
// ══════════════════════════════════════════════════════════════════════════════

let dictPanelOpen = false;
let dictHistory = JSON.parse(localStorage.getItem('dictHistory') || '[]');
let dictAudioUrls = {};

function toggleDictPanel() {
    dictPanelOpen = !dictPanelOpen;
    const panel = document.getElementById('dictPanel');
    const btn   = document.getElementById('dictToggleBtn');
    panel.classList.toggle('open', dictPanelOpen);
    btn.classList.toggle('dict-active', dictPanelOpen);
    if (dictPanelOpen) {
        setTimeout(() => document.getElementById('dictInput').focus(), 320);
    }
}

async function lookupWord() {
    const raw  = document.getElementById('dictInput').value.trim();
    if (!raw) return;
    const word = raw.toLowerCase().replace(/[^a-z\-']/g, '');
    if (!word) return;

    const body = document.getElementById('dictBody');
    body.innerHTML = `<div class="dict-loading"><div class="dict-spinner"></div><br>Looking up <strong>${escH(raw)}</strong>...</div>`;

    try {
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
        if (!res.ok) throw new Error('not_found');
        const data = await res.json();
        if (!Array.isArray(data) || !data.length) throw new Error('not_found');
        renderDictResult(data, word);
        addToHistory(word);
    } catch (e) {
        if (e.message === 'not_found') {
            body.innerHTML = `
                <div class="dict-error">
                    No results found for <strong>${escH(raw)}</strong>.<br><br>
                    Check the spelling, or try the base form of the word (e.g. "run" instead of "running").
                </div>
                ${renderHistoryHTML()}`;
        } else {
            body.innerHTML = `<div class="dict-error">Network error. Check your connection and try again.</div>${renderHistoryHTML()}`;
        }
    }
}

function renderDictResult(entries, word) {
    const body = document.getElementById('dictBody');
    dictAudioUrls = {};

    let html = renderHistoryHTML();

    html += `<div class="dict-word-heading">${escH(entries[0].word || word)}</div>`;

    const phonetics = entries.flatMap(e => e.phonetics || []).filter(p => p.text);
    const uniquePhonetics = [...new Map(phonetics.map(p => [p.text, p])).values()];
    if (uniquePhonetics.length) {
        const ph = uniquePhonetics[0];
        html += `<div class="dict-phonetic">${escH(ph.text)}`;
        const audioSrc = entries.flatMap(e => e.phonetics || []).find(p => p.audio)?.audio;
        if (audioSrc) {
            const audioId = 'aud_' + word;
            dictAudioUrls[audioId] = audioSrc;
            html += `<button class="dict-audio-btn" onclick="playDictAudio('${audioId}')">Play</button>`;
        }
        html += `</div>`;
    }

    const allMeanings = entries.flatMap(e => e.meanings || []);
    const meaningsByPos = {};
    allMeanings.forEach(m => {
        const pos = m.partOfSpeech || 'other';
        if (!meaningsByPos[pos]) meaningsByPos[pos] = [];
        meaningsByPos[pos].push(...(m.definitions || []));
    });

    const posOrder = ['noun','verb','adjective','adverb','pronoun','preposition','conjunction','interjection','other'];
    const sortedPos = [...new Set([...posOrder.filter(p => meaningsByPos[p]), ...Object.keys(meaningsByPos)])];

    sortedPos.forEach(pos => {
        const defs = meaningsByPos[pos];
        if (!defs || !defs.length) return;
        html += `<div class="dict-section">`;
        html += `<div class="dict-pos-badge">${escH(pos)}</div>`;
        defs.slice(0, 6).forEach((def, i) => {
            html += `<div class="dict-definition"><strong>${i + 1}.</strong> ${escH(def.definition)}</div>`;
            if (def.example) html += `<div class="dict-example">"${escH(def.example)}"</div>`;
        });
        if (defs.length > 6) {
            html += `<div style="font-size:12px;color:#999;padding-left:12px;margin-bottom:4px;">+${defs.length - 6} more definitions</div>`;
        }
        html += `</div>`;
    });

    const allSynonyms = [...new Set(
        allMeanings.flatMap(m => [
            ...(m.synonyms || []),
            ...(m.definitions || []).flatMap(d => d.synonyms || [])
        ])
    )].slice(0, 18);

    if (allSynonyms.length) {
        html += `<div class="dict-divider"></div><div class="dict-section">`;
        html += `<div class="dict-meta-label">Synonyms</div>`;
        html += `<div class="dict-synonyms">${allSynonyms.map(s =>
            `<span class="dict-syn-pill" onclick="quickLookup('${escH(s)}')">${escH(s)}</span>`
        ).join('')}</div>`;
        html += `</div>`;
    }

    const allAntonyms = [...new Set(
        allMeanings.flatMap(m => [
            ...(m.antonyms || []),
            ...(m.definitions || []).flatMap(d => d.antonyms || [])
        ])
    )].slice(0, 10);

    if (allAntonyms.length) {
        html += `<div class="dict-divider"></div><div class="dict-section">`;
        html += `<div class="dict-meta-label">Antonyms</div>`;
        html += `<div class="dict-synonyms">${allAntonyms.map(s =>
            `<span class="dict-syn-pill" style="background:#fff1f1;color:#c0392b;border-color:#f9c0c0;" onclick="quickLookup('${escH(s)}')">${escH(s)}</span>`
        ).join('')}</div>`;
        html += `</div>`;
    }

    const origins = entries.map(e => e.origin).filter(Boolean);
    if (origins.length) {
        html += `<div class="dict-divider"></div><div class="dict-section">`;
        html += `<div class="dict-meta-label">Etymology / Origin</div>`;
        html += `<div class="dict-origin">${escH(origins[0])}</div>`;
        html += `</div>`;
    }

    const sourceUrls = [...new Set(entries.flatMap(e => e.sourceUrls || []))];
    if (sourceUrls.length) {
        html += `<div class="dict-source">Source: <a href="${sourceUrls[0]}" target="_blank">${sourceUrls[0]}</a></div>`;
    }

    body.innerHTML = html;
}

function playDictAudio(audioId) {
    const url = dictAudioUrls[audioId];
    if (!url) return;
    new Audio(url).play().catch(() => {});
}

function quickLookup(word) {
    document.getElementById('dictInput').value = word;
    lookupWord();
}

function addToHistory(word) {
    dictHistory = [word, ...dictHistory.filter(w => w !== word)].slice(0, 12);
    localStorage.setItem('dictHistory', JSON.stringify(dictHistory));
}

function renderHistoryHTML() {
    if (!dictHistory.length) return '';
    return `<div class="dict-history">${
        dictHistory.map(w => `<span class="dict-hist-pill" onclick="quickLookup('${escH(w)}')">${escH(w)}</span>`).join('')
    }</div>`;
}

function escH(str) {
    return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
}
