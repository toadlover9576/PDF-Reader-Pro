    <style>

<body>
<div class="load-bar" id="loadBar" style="width:0"></div>

<div class="container">
    <div class="header">
        <h1>Continua | PDF Reader PRO</h1>
        <div class="header-buttons">
            <button class="btn btn-primary" onclick="openAddModal()">+ Add PDF</button>
            <button class="btn btn-secondary" onclick="toggleSidebar()">☰ Menu</button>
        </div>
    </div>

    <div class="main-content">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-tabs">
                <div class="tab active" onclick="switchTab('library')">Library</div>
                <div class="tab" onclick="switchTab('toc')">Contents</div>
            </div>
            <div class="tab-content" id="libraryTab">
                <div class="folder-bar">
                    <select id="folderSelect" class="folder-select" onchange="changeFolder()"></select>
                    <button class="folder-pill" onclick="addFolder()">+F</button>
                    <button class="folder-pill" onclick="renameFolder()">✎</button>
                    <button class="folder-pill" onclick="deleteFolder()">🗑</button>
                </div>
                <div id="folderPalette"></div>
                <div id="libraryList"></div>

                        <span>/ <span id="totalPages">0</span></span>

<div class="modal" id="addModal" onclick="if(event.target === this) closeAddModal()">
    <div class="modal-content">
        <div class="modal-header">
            Add PDF Document
            <button style="float:right;background:none;border:none;font-size:24px;cursor:pointer;color:#999" onclick="closeAddModal()">×</button>
        </div>
        <div class="form-group">
            <label class="form-label">Document Name</label>
            <input type="text" class="form-input" id="pdfName" placeholder="Enter document name">
        </div>
        <div class="form-group">
            <label class="form-label">PDF URL</label>
            <input type="text" class="form-input" id="pdfUrl" placeholder="https://example.com/document.pdf">
        </div>
        <div class="modal-buttons">
            <button class="btn btn-secondary" onclick="closeAddModal()">Cancel</button>
            <button class="btn btn-primary" onclick="addPdf()">Add to Library</button>
        </div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ─── FEATURE DETECT ───────────────────────────────────────────────────────────
// FIX: detect OffscreenCanvas support once so renderPage doesn't silently crash
const SUPPORTS_OFFSCREEN = (function() {
    try { return typeof OffscreenCanvas !== 'undefined' && !!new OffscreenCanvas(1,1).getContext('2d'); }
    catch(_) { return false; }
})();

// ─── SESSION-LEVEL DOC CACHE (pdfDoc objects) ─────────────────────────────────
const sessionDocCache = new Map(); // bookId → pdfDoc

// ─── RENDER CACHE ─────────────────────────────────────────────────────────────
// FIX: Store raw ImageData (not ImageBitmap) so we can repaint without consuming.
// Key: `${bookId}-${page}-${scale}` → ImageData
const renderCache = new Map();
const RENDER_CACHE_MAX = 20;

// ─── PRELOAD ──────────────────────────────────────────────────────────────────
let preloadTimeout = null;

// ─── PERSISTENT PDF BINARY CACHE (IndexedDB) ─────────────────────────────────
const IDB_NAME = 'continua_pdf_cache';
const IDB_STORE = 'pdfs';
let idb = null;

function openIDB() {
    if (idb) return Promise.resolve(idb);
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(IDB_NAME, 1);
        req.onupgradeneeded = e => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(IDB_STORE)) {
                const store = db.createObjectStore(IDB_STORE, { keyPath: 'bookId' });
                store.createIndex('accessed', 'accessed', { unique: false });
            }
        };
        req.onsuccess = e => { idb = e.target.result; resolve(idb); };
        req.onerror = () => reject(req.error);
    });
}

async function idbGet(bookId) {
    try {
        const db = await openIDB();
        return new Promise((resolve) => {
            const tx = db.transaction(IDB_STORE, 'readonly');
            const req = tx.objectStore(IDB_STORE).get(String(bookId));
            req.onsuccess = () => resolve(req.result || null);
            req.onerror = () => resolve(null);
        });
    } catch(_) { return null; }
}

async function idbPut(bookId, arrayBuffer) {
    try {
        const db = await openIDB();
        const all = await new Promise(resolve => {
            const tx = db.transaction(IDB_STORE, 'readonly');
            const req = tx.objectStore(IDB_STORE).index('accessed').getAll();
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => resolve([]);
        });
        // Only evict if at/over limit
        if (all.length >= 20) {
            all.sort((a, b) => a.accessed - b.accessed);
            const toDelete = all.slice(0, all.length - 19);
            const delTx = db.transaction(IDB_STORE, 'readwrite');
            toDelete.forEach(item => delTx.objectStore(IDB_STORE).delete(item.bookId));
            await new Promise(r => { delTx.oncomplete = r; delTx.onerror = r; });
        }
        return new Promise((resolve) => {
            const tx = db.transaction(IDB_STORE, 'readwrite');
            const req = tx.objectStore(IDB_STORE).put({
                bookId: String(bookId),
                data: arrayBuffer,
                accessed: Date.now(),
                size: arrayBuffer.byteLength
            });
            req.onsuccess = () => resolve();
            req.onerror = () => resolve();
        });
    } catch(_) {}
}

async function idbDelete(bookId) {
    try {
        const db = await openIDB();
        return new Promise(resolve => {
            const tx = db.transaction(IDB_STORE, 'readwrite');
            tx.objectStore(IDB_STORE).delete(String(bookId));
            tx.oncomplete = resolve;
            tx.onerror = resolve;
        });
    } catch (_) {}
}

async function idbTouch(bookId) {
    try {
        const db = await openIDB();
        const tx = db.transaction(IDB_STORE, 'readwrite');
        const store = tx.objectStore(IDB_STORE);
        const req = store.get(String(bookId));
        req.onsuccess = () => {
            if (req.result) { req.result.accessed = Date.now(); store.put(req.result); }
        };
    } catch(_) {}
}

async function idbGetCachedIds() {
    try {
        const db = await openIDB();
        return new Promise(resolve => {
            const tx = db.transaction(IDB_STORE, 'readonly');
            const req = tx.objectStore(IDB_STORE).getAllKeys();
            req.onsuccess = () => resolve(new Set(req.result.map(String)));
            req.onerror = () => resolve(new Set());
        });
    } catch (_) { return new Set(); }
}

let cachedBookIds = new Set();
openIDB().then(() => idbGetCachedIds().then(ids => { cachedBookIds = ids; renderLibrary(); }));

// ─── STATE ────────────────────────────────────────────────────────────────────
let library = JSON.parse(localStorage.getItem('pdfLibrary') || '[]');
let currentPage = 1;
let totalPages = 0;
let scale = 1.5;
let pdfDoc = null;
let currentPdfId = null;
let renderInProgress = false;
let pendingRender = null;

let folders = JSON.parse(localStorage.getItem('pdfFolders') || '[]');
let activeFolder = localStorage.getItem('pdfActiveFolder') || 'All';

if (Array.isArray(folders) && typeof folders[0] === 'string') {
    folders = folders.map(name => ({ id: 'fld_' + name, name, color: '#e9ecef', icon: '📁' }));
}
if (!folders.length) {
    folders = [{ id: 'fld_All', name: 'All', color: '#e9ecef', icon: '📁' }];
    activeFolder = 'All';
}
if (!activeFolder) activeFolder = 'All';

library.forEach(b => {
    if (!Array.isArray(b.folders)) {
        b.folders = b.folder ? [b.folder] : ['All'];
        delete b.folder;
    }
    if (!b.folders.includes('All')) b.folders.push('All');
});

localStorage.setItem('pdfLibrary', JSON.stringify(library));
localStorage.setItem('pdfFolders', JSON.stringify(folders));
localStorage.setItem('pdfActiveFolder', activeFolder);

let dragStartIndex = null, dragCurrentIndex = null, isDraggingLibraryItem = false;

// ─── LOAD BAR ─────────────────────────────────────────────────────────────────
function setLoadBar(pct) {
    const bar = document.getElementById('loadBar');
    bar.style.width = pct + '%';
    if (pct >= 100) setTimeout(() => { bar.style.width = '0'; }, 400);
}

// ─── FETCH WITH TIMEOUT ───────────────────────────────────────────────────────
// FIX: Wrap fetch with a timeout so stalled proxies don't hang forever
function fetchWithTimeout(url, timeoutMs = 15000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
}

// ─── PROXY RACE ───────────────────────────────────────────────────────────────
function getProxies(url) {
    return [
        url,
        `https://corsproxy.io/?${encodeURIComponent(url)}`,
        `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
    ];
}

// FIX: fetchPdfBytes now has per-request timeout; fallback uses pdfjsLib directly
// on the SAME proxy list but as a separate last-ditch attempt (not just looping).
async function fetchPdfBytes(url) {
    const proxies = getProxies(url);
    const racePromises = proxies.map(async proxyUrl => {
        const res = await fetchWithTimeout(proxyUrl, 15000);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const buf = await res.arrayBuffer();
        if (buf.byteLength < 100) throw new Error('Empty response');
        return buf;
    });
    return Promise.any(racePromises);
}

async function loadPdfFast(url, bookId) {
    const cMapUrl = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/';

    // Tier 1: Session cache
    if (sessionDocCache.has(bookId)) {
        idbTouch(bookId);
        return sessionDocCache.get(bookId);
    }

    setLoadBar(10);

    // Tier 2: IndexedDB
    const cached = await idbGet(bookId);
    if (cached && cached.data) {
        setLoadBar(50);
        idbTouch(bookId);
        try {
            const doc = await pdfjsLib.getDocument({
                data: cached.data.slice(0),
                cMapUrl,
                cMapPacked: true,
            }).promise;
            sessionDocCache.set(bookId, doc);
            setLoadBar(100);
            return doc;
        } catch (_) {
            await idbDelete(bookId);
            cachedBookIds.delete(String(bookId));
        }
    }

    // Tier 3: Network — fetch raw bytes and parse
    setLoadBar(20);
    let arrayBuffer = null;
    try {
        arrayBuffer = await fetchPdfBytes(url);
    } catch (_) {
        // fetchPdfBytes fully failed; try pdfjsLib direct URL load as last resort
        // FIX: This is a genuinely different approach (stream vs bytes), not just retrying same proxies
        setLoadBar(40);
        const proxies = getProxies(url);
        const docPromises = proxies.map(proxyUrl =>
            pdfjsLib.getDocument({ url: proxyUrl, cMapUrl, cMapPacked: true, withCredentials: false }).promise
        );
        try {
            const doc = await Promise.any(docPromises);
            sessionDocCache.set(bookId, doc);
            setLoadBar(100);
            return doc;
        } catch(finalErr) {
            setLoadBar(0);
            throw new Error('All loading strategies failed. The PDF URL may be unreachable or CORS-blocked. Try a direct PDF link.');
        }
    }

    setLoadBar(70);
    const doc = await pdfjsLib.getDocument({ data: arrayBuffer.slice(0), cMapUrl, cMapPacked: true }).promise;
    sessionDocCache.set(bookId, doc);

    // Store in IDB non-blocking
    idbPut(bookId, arrayBuffer).then(() => {
        cachedBookIds.add(String(bookId));
        renderLibrary();
    });

    setLoadBar(100);
    return doc;
}

// ─── PAGE RENDER ──────────────────────────────────────────────────────────────
// FIX 1: Store ImageData in renderCache instead of ImageBitmap.
//         ImageBitmap is neutered after transferFromImageBitmap; ImageData is plain data you can reuse.
// FIX 2: OffscreenCanvas support is checked up-front via SUPPORTS_OFFSCREEN.
// FIX 3: renderInProgress flag is reset correctly even when fallback is used.

async function renderPage(pageNum) {
    if (!pdfDoc) return;

    if (renderInProgress) {
        pendingRender = pageNum;
        return;
    }

    renderInProgress = true;
    pendingRender = null;

    try {
        const cacheKey = `${currentPdfId}-${pageNum}-${scale}`;
        const viewer = document.getElementById('pdfViewer');

        if (!renderCache.has(cacheKey)) {
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale });

            // Show skeleton while rendering
            viewer.innerHTML = '';
            const skeleton = document.createElement('div');
            skeleton.className = 'loading-skeleton';
            skeleton.style.width = viewport.width + 'px';
            skeleton.style.height = viewport.height + 'px';
            viewer.appendChild(skeleton);

            if (SUPPORTS_OFFSCREEN) {
                // Render off-screen for performance
                const offCanvas = new OffscreenCanvas(viewport.width, viewport.height);
                const ctx = offCanvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport }).promise;
                // FIX: Read back as ImageData (reusable) instead of ImageBitmap (consumed on transfer)
                const imageData = ctx.getImageData(0, 0, viewport.width, viewport.height);
                evictRenderCache();
                renderCache.set(cacheKey, { imageData, width: viewport.width, height: viewport.height });
            } else {
                // Fallback: render to a regular canvas and read back ImageData
                const tmpCanvas = document.createElement('canvas');
                tmpCanvas.width = viewport.width;
                tmpCanvas.height = viewport.height;
                const ctx = tmpCanvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport }).promise;
                const imageData = ctx.getImageData(0, 0, viewport.width, viewport.height);
                evictRenderCache();
                renderCache.set(cacheKey, { imageData, width: viewport.width, height: viewport.height });
            }
        }

        // Paint from cache onto a fresh canvas
        const { imageData, width, height } = renderCache.get(cacheKey);
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').putImageData(imageData, 0, 0);

        viewer.innerHTML = '';
        const container = document.createElement('div');
        container.className = 'pdf-canvas-container';
        container.appendChild(canvas);
        viewer.appendChild(container);

        currentPage = pageNum;
        document.getElementById('pageInput').value = pageNum;
        updateProgress();
        schedulePreload(pageNum);

    } catch (e) {
        console.error('renderPage error:', e);
        document.getElementById('pdfViewer').innerHTML =
            `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>Render Error</h3><p>${e.message}</p></div>`;
    } finally {
        // FIX: Always reset the flag, even on error
        renderInProgress = false;
        if (pendingRender !== null) {
            const next = pendingRender;
            pendingRender = null;
            await renderPage(next);
        }
    }
}

function evictRenderCache() {
    if (renderCache.size >= RENDER_CACHE_MAX) {
        renderCache.delete(renderCache.keys().next().value);
    }
}

// Preload adjacent pages into renderCache
function schedulePreload(currentPageNum) {
    if (preloadTimeout) clearTimeout(preloadTimeout);
    preloadTimeout = setTimeout(async () => {
        const toPreload = [currentPageNum + 1, currentPageNum + 2, currentPageNum - 1].filter(
            p => p >= 1 && p <= totalPages
        );
        for (const p of toPreload) {
            const key = `${currentPdfId}-${p}-${scale}`;
            if (!renderCache.has(key) && pdfDoc) {
                try {
                    const page = await pdfDoc.getPage(p);
                    const viewport = page.getViewport({ scale });
                    if (SUPPORTS_OFFSCREEN) {
                        const offCanvas = new OffscreenCanvas(viewport.width, viewport.height);
                        const ctx = offCanvas.getContext('2d');
                        await page.render({ canvasContext: ctx, viewport }).promise;
                        const imageData = ctx.getImageData(0, 0, viewport.width, viewport.height);
                        evictRenderCache();
                        renderCache.set(key, { imageData, width: viewport.width, height: viewport.height });
                    } else {
                        const tmpCanvas = document.createElement('canvas');
                        tmpCanvas.width = viewport.width;
                        tmpCanvas.height = viewport.height;
                        const ctx = tmpCanvas.getContext('2d');
                        await page.render({ canvasContext: ctx, viewport }).promise;
                        const imageData = ctx.getImageData(0, 0, viewport.width, viewport.height);
                        evictRenderCache();
                        renderCache.set(key, { imageData, width: viewport.width, height: viewport.height });
                    }
                } catch (_) { /* silent — preload is best-effort */ }
            }
        }
    }, 300);
}

// ─── LIBRARY LOADING ──────────────────────────────────────────────────────────
async function loadPdfFromLibrary(index) {
    const item = library[index];
    currentPdfId = item.id;

    const viewer = document.getElementById('pdfViewer');
    viewer.innerHTML = `<div class="loading-skeleton" style="width:595px;height:842px;"></div>`;

    try {
        pdfDoc = await loadPdfFast(item.url, item.id);

        totalPages = pdfDoc.numPages;
        currentPage = item.currentPage || 1;
        scale = item.scale || 1.5;

        document.getElementById('totalPages').textContent = totalPages;
        document.getElementById('pageInput').max = totalPages;
        updateZoomDisplay();

        await renderPage(currentPage);
        await loadTableOfContents();
        renderLibrary();

    } catch (error) {
        viewer.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>Failed to Load PDF</h3><p>${error.message}</p></div>`;
        setLoadBar(0);
        console.error(error);
    }
}

// ─── ADD PDF ──────────────────────────────────────────────────────────────────
async function addPdf() {
    const name = document.getElementById('pdfName').value.trim();
    const url = document.getElementById('pdfUrl').value.trim();
    if (!name || !url) { alert('Please enter both name and URL'); return; }

    const addButton = event.target;
    addButton.textContent = 'Loading...';
    addButton.disabled = true;

    try {
        const tempId = Date.now();
        const pdf = await loadPdfFast(url, tempId);

        const pdfItem = {
            id: tempId,
            name,
            url,
            currentPage: 1,
            totalPages: pdf.numPages,
            scale: 1.5,
            folders: [activeFolder || 'All'],
            addedDate: new Date().toISOString()
        };
        if (!pdfItem.folders.includes('All')) pdfItem.folders.push('All');

        library.push(pdfItem);
        localStorage.setItem('pdfLibrary', JSON.stringify(library));
        renderLibrary();
        closeAddModal();
        await loadPdfFromLibrary(library.length - 1);
    } catch (error) {
        alert('Failed to load PDF. Error: ' + error.message);
        console.error(error);
    } finally {
        addButton.textContent = 'Add to Library';
        addButton.disabled = false;
    }
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
async function nextPage() {
    if (currentPage < totalPages) await renderPage(currentPage + 1);
}

async function prevPage() {
    if (currentPage > 1) await renderPage(currentPage - 1);
}

async function goToPage() {
    const pageNum = parseInt(document.getElementById('pageInput').value);
    if (pageNum >= 1 && pageNum <= totalPages) await renderPage(pageNum);
}

// ─── ZOOM ─────────────────────────────────────────────────────────────────────
function clearRenderCacheForCurrentBook() {
    for (const key of [...renderCache.keys()]) {
        if (key.startsWith(`${currentPdfId}-`)) renderCache.delete(key);
    }
}

async function zoomIn() {
    scale += 0.25;
    updateZoomDisplay();
    clearRenderCacheForCurrentBook();
    if (pdfDoc) { await renderPage(currentPage); updateProgress(); }
}

async function zoomOut() {
    if (scale > 0.5) {
        scale -= 0.25;
        updateZoomDisplay();
        clearRenderCacheForCurrentBook();
        if (pdfDoc) { await renderPage(currentPage); updateProgress(); }
    }
}

function updateZoomDisplay() {
    document.getElementById('zoomLevel').textContent = Math.round((scale / 1.5) * 100) + '%';
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────
function updateProgress() {
    if (currentPdfId) {
        const index = library.findIndex(i => i.id === currentPdfId);
        if (index !== -1) {
            library[index].currentPage = currentPage;
            library[index].scale = scale;
            localStorage.setItem('pdfLibrary', JSON.stringify(library));
            renderLibrary();
        }
    }
}

// ─── TABLE OF CONTENTS ────────────────────────────────────────────────────────
async function loadTableOfContents() {
    const outline = await pdfDoc.getOutline();
    const tocList = document.getElementById('tocList');
    if (!outline || !outline.length) {
        tocList.innerHTML = '<div class="empty-state"><p>No table of contents available</p></div>';
        return;
    }
    function renderOutline(items, level = 0) {
        return items.map(item => `
            <div class="toc-item" style="padding-left:${level * 20 + 10}px" onclick="goToTocPage('${item.dest}')">
                ${item.title}
            </div>
            ${item.items ? renderOutline(item.items, level + 1) : ''}
        `).join('');
    }
    tocList.innerHTML = renderOutline(outline);
}

async function goToTocPage(dest) {
    if (!dest) return;
    try {
        const destArray = await pdfDoc.getDestination(dest);
        if (destArray) {
            const pageIndex = await pdfDoc.getPageIndex(destArray[0]);
            await renderPage(pageIndex + 1);
        }
    } catch (e) { console.error(e); }
}

// ─── FOLDERS ──────────────────────────────────────────────────────────────────
function saveFolders() {
    localStorage.setItem('pdfFolders', JSON.stringify(folders));
    localStorage.setItem('pdfActiveFolder', activeFolder);
}

function renderFolderSelect() {
    const select = document.getElementById('folderSelect');
    const palette = document.getElementById('folderPalette');
    if (!folders.find(f => f.name === 'All')) {
        folders.unshift({ id: 'fld_All', name: 'All', color: '#e9ecef', icon: '📁' });
    }
    if (select) {
        select.innerHTML = folders.map(f =>
            `<option value="${f.name}" ${f.name === activeFolder ? 'selected' : ''}>${f.icon || '📁'} ${f.name}</option>`
        ).join('');
    }
    if (palette) {
        palette.innerHTML = folders.map(f =>
            `<div class="folder-pill" data-folder="${f.name}" onclick="changeFolderByPill('${f.name}')">${f.icon || '📁'} ${f.name}</div>`
        ).join('');
    }
}

function changeFolderByPill(folderName) {
    activeFolder = folderName;
    document.getElementById('folderSelect').value = folderName;
    saveFolders();
    renderLibrary();
}

function changeFolder() {
    activeFolder = document.getElementById('folderSelect').value;
    saveFolders();
    renderLibrary();
}

function addFolder() {
    const name = prompt('New folder name:');
    if (!name || !name.trim() || folders.find(f => f.name === name.trim())) return;
    folders.push({ id: 'fld_' + Date.now(), name: name.trim(), color: '#e9ecef', icon: '📁' });
    activeFolder = name.trim();
    saveFolders();
    renderFolderSelect();
    renderLibrary();
}

function renameFolder() {
    if (activeFolder === 'All') { alert('You cannot rename the "All" folder.'); return; }
    const folder = folders.find(f => f.name === activeFolder);
    if (!folder) return;
    const newName = prompt('Rename folder:', folder.name);
    if (!newName || !newName.trim()) return;
    const trimmed = newName.trim();
    folder.name = trimmed;
    library.forEach(b => {
        const idx = b.folders.indexOf(activeFolder);
        if (idx !== -1) b.folders[idx] = trimmed;
    });
    activeFolder = trimmed;
    localStorage.setItem('pdfLibrary', JSON.stringify(library));
    saveFolders();
    renderFolderSelect();
    renderLibrary();
}

function deleteFolder() {
    if (activeFolder === 'All') { alert('You cannot delete the "All" folder.'); return; }
    if (!confirm(`Delete folder "${activeFolder}"? Books will remain in All.`)) return;
    folders = folders.filter(f => f.name !== activeFolder);
    library.forEach(b => {
        b.folders = b.folders.filter(fn => fn !== activeFolder);
        if (!b.folders.length) b.folders = ['All'];
    });
    activeFolder = 'All';
    localStorage.setItem('pdfLibrary', JSON.stringify(library));
    saveFolders();
    renderFolderSelect();
    renderLibrary();
}

// ─── LIBRARY RENDER & DRAG ───────────────────────────────────────────────────
function toggleBookMenu(event, index) {
    event.stopPropagation();
    closeAllBookMenus();
    const item = document.querySelector(`.library-item[data-index="${index}"]`);
    if (item) item.querySelector('.book-menu-dropdown')?.classList.toggle('open');
}

function closeAllBookMenus() {
    document.querySelectorAll('.book-menu-dropdown.open').forEach(m => m.classList.remove('open'));
}

function renderLibrary() {
    const list = document.getElementById('libraryList');
    const visibleItems = activeFolder === 'All'
        ? library
        : library.filter(item => Array.isArray(item.folders) && item.folders.includes(activeFolder));

    if (!visibleItems.length) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon"></div><p>No books in this folder</p></div>';
        renderFolderSelect();
        return;
    }

    list.innerHTML = visibleItems.map(item => {
        const realIndex = library.findIndex(b => b.id === item.id);
        const isCached = cachedBookIds.has(String(item.id));
        const canRemove = activeFolder !== 'All' && Array.isArray(item.folders) && item.folders.includes(activeFolder);
        return `
            <div class="library-item ${currentPdfId === item.id ? 'active' : ''}" data-index="${realIndex}">
                <div class="library-item-main" onclick="loadPdfFromLibrary(${realIndex})">
                    <div class="library-item-title">
                        ${item.name}
                        ${isCached ? '<span class="cache-badge">CACHED</span>' : ''}
                    </div>
                    <div class="library-item-progress">Page ${item.currentPage || 1} of ${item.totalPages || 1}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:${(item.currentPage / item.totalPages * 100 || 0)}%"></div>
                    </div>
                </div>
                <div class="library-item-right">
                    <button class="book-menu-btn" onclick="toggleBookMenu(event, ${realIndex})">⋮</button>
                    <button class="delete-btn" onclick="event.stopPropagation(); deletePdf(${realIndex})">Delete</button>
                    <div class="book-menu-dropdown">
                        <div class="book-menu-item" onclick="addBookToFolder(${realIndex})">Add to folder</div>
                        <div class="book-menu-item ${canRemove ? '' : 'disabled'}"
                             onclick="${canRemove ? `removeBookFromCurrentFolder(${realIndex})` : 'event.stopPropagation();'}">
                            Remove from this folder
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');

    renderFolderSelect();
    attachLibraryDragHandlers();
}

function attachLibraryDragHandlers() {
    document.querySelectorAll('.library-item').forEach(item => {
        item.onmousedown = function(e) {
            if (e.button !== 0 ||
                e.target.classList.contains('book-menu-btn') ||
                e.target.classList.contains('delete-btn') ||
                e.target.closest('.book-menu-dropdown')) return;

            isDraggingLibraryItem = true;
            dragStartIndex = parseInt(this.getAttribute('data-index'));
            dragCurrentIndex = dragStartIndex;
            this.classList.add('dragging');
            const currentItem = this;

            function onMouseMove(ev) {
                if (!isDraggingLibraryItem) return;
                const el = document.elementFromPoint(ev.clientX, ev.clientY);
                if (!el) return;
                const targetItem = el.closest('.library-item');
                document.querySelectorAll('.library-item.drag-over').forEach(i => i.classList.remove('drag-over'));
                if (targetItem && targetItem !== currentItem) {
                    targetItem.classList.add('drag-over');
                    dragCurrentIndex = parseInt(targetItem.getAttribute('data-index'));
                } else {
                    dragCurrentIndex = dragStartIndex;
                }
            }

            function onMouseUp() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
                if (!isDraggingLibraryItem) return;
                isDraggingLibraryItem = false;
                currentItem.classList.remove('dragging');
                document.querySelectorAll('.library-item.drag-over').forEach(i => i.classList.remove('drag-over'));
                if (dragCurrentIndex !== null && dragStartIndex !== null && dragCurrentIndex !== dragStartIndex) {
                    const temp = library[dragStartIndex];
                    library[dragStartIndex] = library[dragCurrentIndex];
                    library[dragCurrentIndex] = temp;
                    localStorage.setItem('pdfLibrary', JSON.stringify(library));
                    renderLibrary();
                }
                dragStartIndex = null;
                dragCurrentIndex = null;
            }

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        };
    });
}

function deletePdf(index) {
    if (confirm('Are you sure you want to delete this PDF from your library?')) {
        const id = library[index]?.id;
        if (id) {
            sessionDocCache.delete(id);
            idbDelete(id);
            cachedBookIds.delete(String(id));
        }
        library.splice(index, 1);
        localStorage.setItem('pdfLibrary', JSON.stringify(library));
        renderLibrary();
        if (!library.length) {
            document.getElementById('pdfViewer').innerHTML = `
                <div class="empty-state"><div class="empty-state-icon">📄</div><h3>No PDF Loaded</h3><p>Click "Add PDF" to load a document from URL</p></div>
            `;
        }
    }
}

function addBookToFolder(index) {
    const book = library[index];
    if (!book) return;
    const input = prompt(`Add "${book.name}" to which folder?\n\nExisting folders:\n- ` + folders.map(f => f.name).join('\n- '));
    if (!input || !input.trim()) { closeAllBookMenus(); return; }
    const trimmed = input.trim();
    let folder = folders.find(f => f.name === trimmed);
    if (!folder) {
        folder = { id: 'fld_' + Date.now(), name: trimmed, color: '#e9ecef', icon: '📁' };
        folders.push(folder);
        saveFolders();
        renderFolderSelect();
    }
    if (!Array.isArray(book.folders)) book.folders = ['All'];
    if (!book.folders.includes(trimmed)) book.folders.push(trimmed);
    if (!book.folders.includes('All')) book.folders.push('All');
    localStorage.setItem('pdfLibrary', JSON.stringify(library));
    renderLibrary();
    closeAllBookMenus();
    alert(`"${book.name}" added to folder "${trimmed}".`);
}

function removeBookFromCurrentFolder(index) {
    if (activeFolder === 'All') { closeAllBookMenus(); return; }
    const book = library[index];
    if (!book || !book.folders?.includes(activeFolder)) { closeAllBookMenus(); return; }
    book.folders = book.folders.filter(fn => fn !== activeFolder);
    if (!book.folders.length) book.folders = ['All'];
    localStorage.setItem('pdfLibrary', JSON.stringify(library));
    renderLibrary();
    closeAllBookMenus();
    alert(`"${book.name}" removed from folder "${activeFolder}".`);
}

document.addEventListener('click', e => {
    if (!e.target.closest('.library-item-right')) closeAllBookMenus();
});

// ─── MODALS ───────────────────────────────────────────────────────────────────
function openAddModal() {
    document.getElementById('addModal').classList.add('active');
    document.getElementById('pdfName').value = '';
    document.getElementById('pdfUrl').value = '';
}
function closeAddModal() {
    document.getElementById('addModal').classList.remove('active');
}

// ─── UI ───────────────────────────────────────────────────────────────────────
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    if (tab === 'library') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('libraryTab').style.display = 'block';
    } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('tocTab').style.display = 'block';
    }
}

function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.style.display = sidebar.style.display === 'none' ? 'flex' : 'none';
}

function toggleFullscreen() {
    const container = document.querySelector('.container');
    const btn = document.getElementById('fullscreenBtn');
    if (!document.fullscreenElement) {
        container.requestFullscreen().then(() => { btn.textContent = '⛶ Exit Fullscreen'; }).catch(err => alert(err.message));
    } else {
        document.exitFullscreen().then(() => { btn.textContent = '⛶ Fullscreen'; });
    }
}

document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) document.getElementById('fullscreenBtn').textContent = '⛶ Fullscreen';
});

// ─── KEYBOARD SHORTCUTS ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderFolderSelect();
renderLibrary();
updateZoomDisplay();
</script>
